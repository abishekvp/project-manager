services:
  - type: web
    name: project-manager
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn main.wsgi
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        fromDatabase:
          name: project-manager-db
          property: connectionString
      - key: DB_NAME
        fromDatabase:
          name: project-manager-db
          property: name
      - key: DB_USER
        fromDatabase:
          name: project-manager-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: project-manager-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: project-manager-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: project-manager-db
          property: port

databases:
  - name: project-manager-db
    databaseName: project_manager_db
    user: project_manager_user
    plan: free
