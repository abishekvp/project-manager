{% extends 'index.html' %}
{% block title %}Sign In | BLISS-INFOTECH{% endblock title %}

{% block sign %}
<!-- Background with subtle neon gradient glow -->
<div class="min-h-screen flex items-center justify-center relative overflow-hidden" style="margin-top: -50px;">
  <!-- Abstract neon orbs in background -->
  <div
    class="absolute top-[20%] left-[20%] w-[30rem] h-[30rem] bg-[#00f3ff] rounded-full mix-blend-screen filter blur-[128px] opacity-10 animate-pulse">
  </div>
  <div
    class="absolute bottom-[20%] right-[20%] w-[30rem] h-[30rem] bg-[#ff00ff] rounded-full mix-blend-screen filter blur-[128px] opacity-10 animate-pulse"
    style="animation-delay: 2s;"></div>

  <!-- Glassmorphism Card -->
  <div
    class="w-full max-w-md p-8 m-4 rounded-xl glass-panel relative z-10 neon-border transition-all duration-500 hover:shadow-[0_0_30px_rgba(0,243,255,0.2)]">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold tracking-widest neon-text-cyan mb-2 uppercase">BLISS-INFOTECH</h1>
      <p class="text-gray-400 text-xs tracking-[0.3em] uppercase opacity-70">Secure Authentication Protocol</p>
    </div>

    <form action="" method="post" class="space-y-6" hx-boost="true">
      {% csrf_token %}

      <div class="relative group">
        <i
          class="fas fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500 group-focus-within:text-[#00f3ff] transition-colors duration-300"></i>
        <input type="text" name="username" id="username"
          class="w-full bg-black/40 border border-gray-700/50 rounded-lg py-3 px-11 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-[#00f3ff] focus:ring-1 focus:ring-[#00f3ff] transition-all duration-300"
          placeholder="Username or Email" required autocomplete="off">
      </div>

      <div class="relative group">
        <i
          class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500 group-focus-within:text-[#00f3ff] transition-colors duration-300"></i>
        <input type="password" name="password" id="password"
          class="w-full bg-black/40 border border-gray-700/50 rounded-lg py-3 px-11 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-[#00f3ff] focus:ring-1 focus:ring-[#00f3ff] transition-all duration-300"
          placeholder="Password" required>
      </div>

      <div class="pt-4">
        <button type="submit"
          class="w-full py-3 px-4 rounded-lg font-bold tracking-widest uppercase text-sm neon-btn flex justify-center items-center gap-3 group">
          <span>Initialize Session</span>
          <i class="fas fa-chevron-right text-xs group-hover:translate-x-1 transition-transform"></i>
        </button>
      </div>
    </form>

    <div class="mt-8 text-center text-xs tracking-wider">
      <p class="text-gray-400">
        UNREGISTERED ENTITY?
        <a href="/signup"
          class="text-[#ff00ff] hover:text-white hover:shadow-[#ff00ff] transition-all ml-2 font-bold flex items-center justify-center gap-1 inline-flex hover:underline decoration-[#ff00ff] underline-offset-4">
          CONSTRUCT PROFILE <i class="fas fa-arrow-right text-[10px]"></i>
        </a>
      </p>
      <p class="text-gray-400 mt-4">
        FORGOT PASSWORD?
        <a href="/forgot-password"
          class="text-[#00f3ff] hover:text-white hover:shadow-[#00f3ff] transition-all ml-2 font-bold flex items-center justify-center gap-1 inline-flex hover:underline decoration-[#00f3ff] underline-offset-4">
          RESET HERE <i class="fas fa-arrow-right text-[10px]"></i>
        </a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
